<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Vendas PDV</title>
  <link rel="stylesheet"  type="text/css "href="../css/style.css">
  <link rel="stylesheet"   href="../css/bootstrap-5.3.3-dist/css/bootstrap.css">
  <script src="../css/bootstrap-5.3.3-dist/js/bootstrap.js"></script>
</head>
<body>
 
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="../index.html">Daniel Sistem</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarScroll">
      <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="../index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#produtosModal">Cadastro Produtos</a><!-- Button trigger modaldata-bs-target="#exampleModal" -->
        </li>
       
       
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">

      </form>
    </div>
  </div>

  <!--MODAL -->

 

 

<!-- Modal CLIENTES -->
<div class="modal fade" id="produtosModal" tabindex="-1" aria-labelledby="produtosModal" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="produtosModal">CADASTRO DE PRODUTOS</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        



      <form id="crud-form">
      <label for="produtoName" class="form-label">Produto Nome</label>
      <input type="text" id="produtoName"  class="form-control" placeholder="Nome" required>
      </br>
      <label for="produtopreco" class="form-label">Produto preço</label>
      <input type="number" id="produtopreco" class="form-control" placeholder="Code" required>
      </br>
      <label for="produtoTipo" class="form-label">Produto Tipo</label>
      </br>
       <hr>
        <input type="radio" class="btn-check" name="options-outlined" id="produtoTipoUnidade" autocomplete="off" checked value="Unidade">
        <label class="btn btn-outline-success" for="produtoTipoUnidade">UNIDADE</label>

        <input type="radio" class="btn-check" name="options-outlined" id="produtoTipoMetro" autocomplete="off" value="Metro-2">
        <label class="btn btn-outline-danger" for="produtoTipoMetro">METRO - 2</label>    
        
          </br>
        <hr>

      </br>
      <button type="submit" id="produtoSubmit" class="btn btn-primary">Adicionar</button>
    </form>



      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>


<br/>
<br/>
<br/>
      



<div class="container mt-4">
               
        <div class="row">
            <div class="col-md-6">
                <h3>Gerar Orcamento</h3>

                <form id="pdvForm">
                    <div class="mb-3">
                       <input type="text" id="filtro" class="form-control" placeholder="Digite o nome do Usuario para buscar...">
                       <br>
                       <select class="form-select" id="selecCliente" aria-label="Default select example">
                
                      </select>  

                   <br>
              <select class="form-select" aria-label="Default select example" id="produtoNome" onchange="getPreco();">

              </select>
                    </div>
                    <!--<div class="btn-group" role="group" aria-label="Basic example">
                      <button type="button" class="btn btn-success" id="inputUnidade" >Item por Unidade</button>
                      <button type="button" class="btn btn-warning" id="inputM2" >Item M2</button>
                    </div>-->
                    <div class="mb-3">
                        <label class="form-label" id="LbLargura">Largura</label>
                        <input type="number" id="produtoLargura" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" id="LBAltura">Altura</label>
                        <input type="number" id="produtoAltura" class="form-control" required>
                    </div>
                      <button type="button" class="btn btn-primary" id="CalArea" onclick="calcularArea()">CalArea</button>
                     <div class="mb-3">

                        <label class="form-label" id="LbTotArea" >Total Area</label>
                        <input type="number" id="totArea" class="form-control" required disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" id="produtoPreco" class="form-control" required disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" id="produtoQuantidade" class="form-control" required>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="adicionarAoCarrinho()">Adicionar ao Carrinho</button>
                </form>
            </div>
            
            <div class="col-md-6">
                <h3>Carrinho</h3>
                
                <ul id="carrinho" class="list-group"></ul>
                <h4 class="mt-3">Total: R$ <span id="totalCompra">0.00</span></h4>
                <div class="mb-3">
                        <label class="form-label">Adcionar Entrada</label>
                        <input type="number" id="valorentrada"  class="form-control" required>
                        <button class="btn btn-danger mt-2" onclick="calcEntrada()">Adcionar Entrada</button>
<!---------------------------------------------------------------->
  </br>
                        <hr>
        <input type="radio" class="btn-check" name="options-outlined-" id="orcFinalizado" autocomplete="off" checked value="FINALIZADO">
        <label class="btn btn-outline-success" for="orcFinalizado">ORÇAMENTO FINALIZADO</label>

        <input type="radio" class="btn-check" name="options-outlined-" id="orcPendente" autocomplete="off" value="PENDENTE">
        <label class="btn btn-outline-warning" for="orcPendente">ORÇAMENTO PENDENTE</label>  

        <input type="radio" class="btn-check" name="options-outlined-" id="orcAberto" autocomplete="off" checked value="ABERTO">
        <label class="btn btn-outline-primary" for="orcAberto">ORÇAMENTO ABERTO</label>  
        <hr>
          </br>
<!---------------------------------------------------------------->
                    </div>
                
                <button class="btn btn-success mt-2" onclick="finalizarCompra()">FINALIZAR ORÇAMENTO</button>
            </div>
        </div>
    </div>

<script type="module" src="../js/firebaseOrcamento.js">
</script>
</body>
</html>
